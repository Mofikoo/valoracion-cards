<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pruebas Funcionales – Flashcards</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --border: #334155;
      --accent: #6366f1;
      --accent2: #818cf8;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --radius: 16px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: -0.02em;
    }
    header h1 span { color: var(--muted); font-weight: 400; font-size: 0.9rem; margin-left: 8px; }

    /* ── PROGRESS BAR ── */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      max-width: 320px;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

    /* ── CONTROLS ── */
    .controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    select, button {
      font-family: inherit;
      font-size: 0.82rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    select:hover, button:hover { border-color: var(--accent2); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover { background: var(--accent2); border-color: var(--accent2); }
    .controls-right { margin-left: auto; display: flex; gap: 8px; }

    /* ── MAIN AREA ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      gap: 24px;
    }

    /* ── CARD COUNTER ── */
    .card-counter {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .card-counter strong { color: var(--text); }

    /* ── FLASHCARD ── */
    .card-scene {
      width: 100%;
      max-width: 720px;
      perspective: 1200px;
    }
    .card {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-front {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 56px 40px;
      min-height: 340px;
    }
    .card-back {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: var(--surface);
      transform: rotateY(180deg);
      padding: 28px 32px;
    }

    .card-region-badge {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 99px;
      margin-bottom: 20px;
    }
    .card-num {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .card-name {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
      margin-bottom: 12px;
    }
    .card-category {
      font-size: 0.82rem;
      color: var(--accent2);
      font-weight: 500;
    }
    .flip-hint {
      margin-top: 28px;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .flip-hint svg { opacity: 0.5; }

    /* ── BACK SECTIONS ── */
    .back-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .back-title { font-size: 1.1rem; font-weight: 700; line-height: 1.3; }
    .back-meta { font-size: 0.72rem; color: var(--accent2); margin-top: 4px; }

    .sections { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 560px) { .sections { grid-template-columns: 1fr; } }

    .section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .section.full { grid-column: 1 / -1; }
    .section-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .section-label .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .section-content {
      font-size: 0.83rem;
      line-height: 1.55;
      color: var(--text);
      white-space: pre-line;
    }
    .section.interpretation .section-label .dot { background: var(--green); }
    .section.evidence .section-label .dot { background: var(--amber); }

    /* ── NAVIGATION ── */
    .nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nav-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-btn:hover { background: var(--surface2); border-color: var(--accent2); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── RATING BUTTONS ── */
    .rating {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .rating-btn {
      padding: 8px 20px;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 600;
      border: 2px solid;
      cursor: pointer;
      transition: all 0.15s;
    }
    .rating-btn.easy   { border-color: var(--green); color: var(--green); background: transparent; }
    .rating-btn.medium { border-color: var(--amber); color: var(--amber); background: transparent; }
    .rating-btn.hard   { border-color: var(--red);   color: var(--red);   background: transparent; }
    .rating-btn.easy:hover   { background: var(--green); color: #000; }
    .rating-btn.medium:hover { background: var(--amber); color: #000; }
    .rating-btn.hard:hover   { background: var(--red);   color: #fff; }

    /* ── DONE OVERLAY ── */
    #done-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 48px 24px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }
    #done-screen h2 { font-size: 1.8rem; }
    #done-screen p  { color: var(--muted); line-height: 1.6; }
    .stats { display: flex; gap: 24px; margin: 8px 0; }
    .stat { text-align: center; }
    .stat-n { font-size: 2rem; font-weight: 700; }
    .stat-n.easy   { color: var(--green); }
    .stat-n.medium { color: var(--amber); }
    .stat-n.hard   { color: var(--red); }
    .stat-l { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 10px 20px; border-radius: 99px;
      font-size: 0.82rem; color: var(--text);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      z-index: 100;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <h1>Pruebas Funcionales <span>Flashcards</span></h1>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <span class="progress-label" id="progress-label">0 / 60</span>
  </div>
</header>

<div class="controls">
  <label for="filter-region" style="font-size:0.82rem;color:var(--muted)">Región:</label>
  <select id="filter-region">
    <option value="all">Todas las regiones</option>
  </select>
  <label for="filter-cat" style="font-size:0.82rem;color:var(--muted)">Categoría:</label>
  <select id="filter-cat">
    <option value="all">Todas las categorías</option>
  </select>
  <div class="controls-right">
    <button id="btn-shuffle">🔀 Mezclar</button>
    <button id="btn-reset">↺ Reiniciar</button>
    <button class="primary" id="btn-review-hard">🔴 Solo difíciles</button>
  </div>
</div>

<main>
  <div class="card-counter" id="card-counter"></div>

  <div class="card-scene" id="card-scene">
    <div class="card" id="card" tabindex="0" role="button" aria-label="Voltear tarjeta">
      <!-- Front -->
      <div class="card-face card-front" id="card-front">
        <div class="card-region-badge" id="front-region"></div>
        <div class="card-num" id="front-num"></div>
        <div class="card-name" id="front-name"></div>
        <div class="card-category" id="front-category"></div>
        <div class="flip-hint">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          Clic para ver el reverso
        </div>
      </div>
      <!-- Back -->
      <div class="card-face card-back" id="card-back">
        <div class="back-header">
          <div>
            <div class="back-title" id="back-name"></div>
            <div class="back-meta" id="back-meta"></div>
          </div>
        </div>
        <div class="sections">
          <div class="section" id="sec-pos-patient">
            <div class="section-label"><span class="dot"></span>Posición del paciente</div>
            <div class="section-content" id="back-pos-patient"></div>
          </div>
          <div class="section" id="sec-pos-therapist">
            <div class="section-label"><span class="dot"></span>Posición del terapeuta</div>
            <div class="section-content" id="back-pos-therapist"></div>
          </div>
          <div class="section full">
            <div class="section-label"><span class="dot"></span>Ejecución del test</div>
            <div class="section-content" id="back-execution"></div>
          </div>
          <div class="section interpretation full">
            <div class="section-label"><span class="dot"></span>Interpretación</div>
            <div class="section-content" id="back-interpretation"></div>
          </div>
          <div class="section evidence full" id="sec-evidence">
            <div class="section-label"><span class="dot"></span>Evidencia científica</div>
            <div class="section-content" id="back-evidence"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn" id="btn-prev" title="Anterior (←)">←</button>
    <div class="rating" id="rating" style="display:none">
      <button class="rating-btn easy"   id="btn-easy">✅ Fácil</button>
      <button class="rating-btn medium" id="btn-medium">⚠️ Regular</button>
      <button class="rating-btn hard"   id="btn-hard">❌ Difícil</button>
    </div>
    <button class="nav-btn" id="btn-next" title="Siguiente (→)">→</button>
  </div>

  <!-- Done screen -->
  <div id="done-screen">
    <div style="font-size:3rem">🎉</div>
    <h2>¡Sesión completada!</h2>
    <p>Has revisado todas las tarjetas de esta sesión.</p>
    <div class="stats">
      <div class="stat"><div class="stat-n easy" id="done-easy">0</div><div class="stat-l">Fácil</div></div>
      <div class="stat"><div class="stat-n medium" id="done-medium">0</div><div class="stat-l">Regular</div></div>
      <div class="stat"><div class="stat-n hard" id="done-hard">0</div><div class="stat-l">Difícil</div></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="primary" id="btn-restart-done">↺ Repetir sesión</button>
      <button id="btn-hard-done" id="btn-review-hard-done">🔴 Repasar difíciles</button>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="cardsdata.js"></script>
<script>
// ── STATE ──
let deck = [];
let currentIndex = 0;
let isFlipped = false;
const ratings = {}; // cardId -> 'easy'|'medium'|'hard'
let mode = 'all'; // 'all' | 'hard'

// ── DOM ──
const cardEl        = document.getElementById('card');
const frontRegion   = document.getElementById('front-region');
const frontNum      = document.getElementById('front-num');
const frontName     = document.getElementById('front-name');
const frontCat      = document.getElementById('front-category');
const backName      = document.getElementById('back-name');
const backMeta      = document.getElementById('back-meta');
const backPosPat    = document.getElementById('back-pos-patient');
const backPosTher   = document.getElementById('back-pos-therapist');
const backExec      = document.getElementById('back-execution');
const backInterp    = document.getElementById('back-interpretation');
const backEvid      = document.getElementById('back-evidence');
const secEvid       = document.getElementById('sec-evidence');
const ratingDiv     = document.getElementById('rating');
const progressFill  = document.getElementById('progress-fill');
const progressLabel = document.getElementById('progress-label');
const cardCounter   = document.getElementById('card-counter');
const doneScreen    = document.getElementById('done-screen');
const cardScene     = document.getElementById('card-scene');
const filterRegion  = document.getElementById('filter-region');
const filterCat     = document.getElementById('filter-cat');

// ── POPULATE FILTERS ──
function populateFilters() {
  const regions = [...new Set(CARDS.map(c => c.region))];
  regions.forEach(r => {
    const o = document.createElement('option');
    o.value = r; o.textContent = r;
    filterRegion.appendChild(o);
  });
  const cats = [...new Set(CARDS.map(c => c.category))].sort();
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    filterCat.appendChild(o);
  });
}

// ── BUILD DECK ──
function buildDeck() {
  const regionVal = filterRegion.value;
  const catVal    = filterCat.value;
  let filtered = CARDS.filter(c =>
    (regionVal === 'all' || c.region === regionVal) &&
    (catVal    === 'all' || c.category === catVal)
  );
  if (mode === 'hard') {
    filtered = filtered.filter(c => ratings[c.id] === 'hard');
  }
  deck = filtered;
  currentIndex = 0;
  showCard();
}

// ── SHUFFLE ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ── RENDER ──
function showCard() {
  unflip(false);
  doneScreen.style.display = 'none';
  cardScene.style.display  = '';
  ratingDiv.style.display  = 'none';

  if (deck.length === 0) {
    cardCounter.textContent = 'No hay tarjetas con estos filtros.';
    cardScene.style.display = 'none';
    updateProgress();
    return;
  }

  if (currentIndex >= deck.length) {
    showDone();
    return;
  }

  const c = deck[currentIndex];

  frontRegion.textContent  = c.region;
  frontNum.textContent     = `Test nº ${c.num}`;
  frontName.textContent    = c.name;
  frontCat.textContent     = c.category;

  backName.textContent     = c.name;
  backMeta.textContent     = `${c.region}  ·  ${c.category}`;
  backPosPat.textContent   = c.posPatient;
  backPosTher.textContent  = c.posTherapist;
  backExec.textContent     = c.execution;
  backInterp.textContent   = c.interpretation;

  if (c.evidence && !c.evidence.toLowerCase().includes('sin evidencia') && !c.evidence.toLowerCase().includes('sin datos')) {
    backEvid.textContent   = c.evidence;
    secEvid.style.display  = '';
  } else {
    secEvid.style.display  = 'none';
  }

  cardCounter.textContent  = `Tarjeta ${currentIndex + 1} de ${deck.length}`;
  updateProgress();

  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = false;
}

function updateProgress() {
  const rated = deck.filter(c => ratings[c.id]).length;
  const pct   = deck.length ? (rated / deck.length) * 100 : 0;
  progressFill.style.width  = pct + '%';
  progressLabel.textContent = `${rated} / ${deck.length}`;
}

// ── FLIP ──
function flip() {
  isFlipped = !isFlipped;
  cardEl.classList.toggle('flipped', isFlipped);
  ratingDiv.style.display = isFlipped ? 'flex' : 'none';
}

function unflip(animate = true) {
  if (!animate) cardEl.style.transition = 'none';
  isFlipped = false;
  cardEl.classList.remove('flipped');
  ratingDiv.style.display = 'none';
  if (!animate) requestAnimationFrame(() => { cardEl.style.transition = ''; });
}

// ── RATING ──
function rate(level) {
  const c = deck[currentIndex];
  if (c) ratings[c.id] = level;
  currentIndex++;
  showCard();
}

// ── DONE ──
function showDone() {
  cardScene.style.display = 'none';
  doneScreen.style.display = 'flex';
  cardCounter.textContent = '';

  const counts = { easy: 0, medium: 0, hard: 0 };
  deck.forEach(c => { if (ratings[c.id]) counts[ratings[c.id]]++; });
  document.getElementById('done-easy').textContent   = counts.easy;
  document.getElementById('done-medium').textContent = counts.medium;
  document.getElementById('done-hard').textContent   = counts.hard;

  const hardCount = deck.filter(c => ratings[c.id] === 'hard').length;
  document.getElementById('btn-hard-done').style.display = hardCount ? '' : 'none';

  progressFill.style.width  = '100%';
  progressLabel.textContent = `${deck.length} / ${deck.length}`;
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (isFlipped) rate('medium');
    else goNext();
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    goPrev();
  } else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    flip();
  } else if (e.key === '1') { if (isFlipped) rate('easy'); }
    else if (e.key === '2') { if (isFlipped) rate('medium'); }
    else if (e.key === '3') { if (isFlipped) rate('hard'); }
});

function goNext() {
  if (currentIndex < deck.length - 1 && !isFlipped) {
    currentIndex++;
    showCard();
  }
}
function goPrev() {
  if (currentIndex > 0) { currentIndex--; showCard(); }
}

// ── TOAST ──
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ── EVENTS ──
cardEl.addEventListener('click', flip);
cardEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); }});

document.getElementById('btn-prev').addEventListener('click', goPrev);
document.getElementById('btn-next').addEventListener('click', () => {
  if (isFlipped) rate('medium'); else goNext();
});

document.getElementById('btn-easy').addEventListener('click', () => rate('easy'));
document.getElementById('btn-medium').addEventListener('click', () => rate('medium'));
document.getElementById('btn-hard').addEventListener('click', () => rate('hard'));

document.getElementById('btn-shuffle').addEventListener('click', () => {
  shuffle(deck);
  currentIndex = 0;
  showCard();
  toast('🔀 Mazo mezclado');
});

document.getElementById('btn-reset').addEventListener('click', () => {
  Object.keys(ratings).forEach(k => delete ratings[k]);
  mode = 'all';
  buildDeck();
  toast('↺ Sesión reiniciada');
});

document.getElementById('btn-review-hard').addEventListener('click', () => {
  const hardCount = CARDS.filter(c => ratings[c.id] === 'hard').length;
  if (hardCount === 0) { toast('No hay tarjetas marcadas como difíciles aún.'); return; }
  mode = 'hard';
  buildDeck();
  toast(`🔴 ${hardCount} tarjetas difíciles`);
});

document.getElementById('btn-restart-done').addEventListener('click', () => {
  mode = 'all';
  buildDeck();
});

document.getElementById('btn-hard-done').addEventListener('click', () => {
  mode = 'hard';
  buildDeck();
});

filterRegion.addEventListener('change', buildDeck);
filterCat.addEventListener('change', buildDeck);

// ── INIT ──
populateFilters();
buildDeck();
</script>
</body>
</html>
