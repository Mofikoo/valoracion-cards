<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pruebas Funcionales – Fisioterapia</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #13110f;
      --surface:  #1d1a17;
      --surface2: #272320;
      --surface3: #31291f;
      --border:   #3a3028;
      --accent:   #d97b3a;
      --accent2:  #e8a96a;
      --accent-dim: rgba(217,123,58,0.15);
      --green:    #5cb87a;
      --amber:    #e8a96a;
      --red:      #e06060;
      --text:     #ede8e2;
      --muted:    #8a7d70;
      --radius:   14px;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR : une seule barre fusionnée ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    /* Ligne 1 : brand + onglets */
    .topbar-nav {
      display: flex;
      align-items: stretch;
      height: 48px;
      padding: 0 20px;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-right: 24px;
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--accent2);
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .nav-brand .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .nav-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px; /* couvre la border-bottom du parent */
      transition: color 0.2s, border-color 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { color: var(--accent2); border-bottom-color: var(--accent); }
    .nav-tab svg { flex-shrink: 0; }

    /* Ligne 2 : controls flashcard */
    .topbar-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 20px;
      flex-wrap: wrap;
    }
    .topbar-controls-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }

    /* Progress inline dans les controls */
    .progress-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .progress-bar {
      width: 100px; height: 3px;
      background: var(--border);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-label { font-size: 0.72rem; color: var(--muted); white-space: nowrap; font-family: 'DM Mono', monospace; }

    /* Séparateur vertical */
    .sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

    /* ── PAGE SECTIONS ── */
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }

    select, button {
      font-family: inherit;
      font-size: 0.78rem;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      line-height: 1.4;
    }
    select:hover, button:hover { border-color: var(--accent); }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    button.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #1d1a17; }
    label { font-size: 0.72rem; color: var(--muted); }

    /* ── MAIN AREA ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
      gap: 20px;
    }
    .card-counter { font-size: 0.78rem; color: var(--muted); font-family: 'DM Mono', monospace; }

    /* ── FLASHCARD ── */
    .card-scene {
      width: 100%;
      max-width: 700px;
      perspective: 1200px;
    }
    .card {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-front {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 52px 40px;
      min-height: 320px;
      position: relative;
    }
    .card-front::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(217,123,58,0.08) 0%, transparent 65%);
      pointer-events: none;
    }
    .card-back {
      position: absolute;
      top: 0; left: 0; right: 0;
      min-height: 100%;
      background: var(--surface);
      transform: rotateY(180deg);
      padding: 24px 28px;
    }

    .card-region-badge {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 99px;
      margin-bottom: 18px;
    }
    .card-num { font-size: 0.68rem; color: var(--muted); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
    .card-name { font-size: 1.5rem; font-weight: 700; line-height: 1.25; color: var(--text); margin-bottom: 10px; }
    .card-category { font-size: 0.78rem; color: var(--accent2); font-weight: 500; }
    .flip-hint {
      margin-top: 24px;
      font-size: 0.68rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── BACK SECTIONS ── */
    .back-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .back-title { font-size: 1.05rem; font-weight: 700; line-height: 1.3; }
    .back-meta { font-size: 0.7rem; color: var(--accent2); margin-top: 3px; }

    .sections { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 560px) { .sections { grid-template-columns: 1fr; } }

    .section {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .section.full { grid-column: 1 / -1; }
    .section-label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .section-label .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    .section-content { font-size: 0.81rem; line-height: 1.55; color: var(--text); white-space: pre-line; }
    .section.interpretation .section-label .dot { background: var(--green); }

    /* ── NAVIGATION ── */
    .nav-row { display: flex; align-items: center; gap: 12px; }
    .nav-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .nav-btn:hover { background: var(--surface2); border-color: var(--accent); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── RATING ── */
    .rating { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .rating-btn {
      padding: 7px 18px;
      border-radius: 99px;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1.5px solid;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .rating-btn.easy   { border-color: var(--green); color: var(--green); background: transparent; }
    .rating-btn.medium { border-color: var(--amber); color: var(--amber); background: transparent; }
    .rating-btn.hard   { border-color: var(--red);   color: var(--red);   background: transparent; }
    .rating-btn.easy:hover   { background: var(--green); color: #0d1f14; }
    .rating-btn.medium:hover { background: var(--amber); color: #1d160a; }
    .rating-btn.hard:hover   { background: var(--red);   color: #fff; }

    /* ── DONE SCREEN ── */
    #done-screen {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 48px 24px;
      text-align: center; max-width: 440px; width: 100%;
    }
    #done-screen h2 { font-size: 1.7rem; }
    #done-screen p  { color: var(--muted); line-height: 1.6; font-size: 0.9rem; }
    .stats { display: flex; gap: 24px; margin: 8px 0; }
    .stat { text-align: center; }
    .stat-n { font-size: 2rem; font-weight: 700; font-family: 'DM Mono', monospace; }
    .stat-n.easy   { color: var(--green); }
    .stat-n.medium { color: var(--amber); }
    .stat-n.hard   { color: var(--red); }
    .stat-l { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 9px 18px; border-radius: 99px;
      font-size: 0.78rem; color: var(--text);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s; z-index: 100;
    }
    #toast.show { opacity: 1; }

    /* ══════════════════════════════
       QUIZ PAGE
    ══════════════════════════════ */
    .quiz-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
      gap: 0;
    }

    .quiz-setup {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 24px;
    }
    .quiz-setup h2 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .quiz-setup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    @media (max-width: 540px) { .quiz-setup-grid { grid-template-columns: 1fr; } }

    .quiz-setup-group { display: flex; flex-direction: column; gap: 5px; }
    .quiz-setup-group label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
    .quiz-setup-group select { width: 100%; }

    .quiz-param-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }
    .quiz-param-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
      user-select: none;
    }
    .quiz-param-chip:hover { border-color: var(--accent); color: var(--text); }
    .quiz-param-chip.selected { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
    .quiz-param-chip .chip-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; flex-shrink: 0;
    }

    .quiz-start-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .quiz-start-row .q-count { font-size: 0.78rem; color: var(--muted); }

    /* ── QUESTION CARD ── */
    .quiz-card {
      width: 100%;
      max-width: 680px;
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .quiz-card.visible { display: flex; }

    .quiz-progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .quiz-prog-bar {
      flex: 1; height: 4px;
      background: var(--border); border-radius: 99px; overflow: hidden;
    }
    .quiz-prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .quiz-prog-label { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }

    .quiz-question-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }
    .quiz-question-tag {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .quiz-question-text {
      font-size: 0.92rem;
      line-height: 1.55;
      color: var(--text);
      font-weight: 500;
    }
    .quiz-question-hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 10px;
    }

    .quiz-choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .quiz-choice {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 16px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.83rem;
      line-height: 1.4;
      color: var(--text);
      font-family: inherit;
      text-align: left;
    }
    .quiz-choice:hover { border-color: var(--accent); background: var(--surface2); }
    .quiz-choice.selected { border-color: var(--accent); background: var(--accent-dim); }
    .quiz-choice.correct  { border-color: var(--green) !important; background: rgba(92,184,122,0.1) !important; color: var(--green); }
    .quiz-choice.wrong    { border-color: var(--red) !important;   background: rgba(224,96,96,0.1) !important;  color: var(--red);   opacity: 0.8; }
    .quiz-choice.revealed { cursor: default; }
    .choice-letter {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-size: 0.68rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      transition: all 0.15s;
    }
    .quiz-choice.selected .choice-letter { border-color: var(--accent); background: var(--accent); color: #fff; }
    .quiz-choice.correct  .choice-letter { border-color: var(--green); background: var(--green); color: #0d1f14; }
    .quiz-choice.wrong    .choice-letter { border-color: var(--red);   background: var(--red);   color: #fff; }

    .quiz-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .quiz-feedback {
      flex: 1;
      font-size: 0.8rem;
      line-height: 1.4;
      color: var(--muted);
      display: none;
    }
    .quiz-feedback.show { display: block; }
    .quiz-feedback.ok  { color: var(--green); }
    .quiz-feedback.bad { color: var(--red); }

    /* ── QUIZ DONE ── */
    .quiz-done {
      width: 100%; max-width: 480px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .quiz-done.visible { display: flex; }
    .quiz-done h2 { font-size: 1.5rem; }
    .quiz-score { font-size: 3rem; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--accent2); }
    .quiz-score span { font-size: 1.2rem; color: var(--muted); font-weight: 400; }
    .quiz-done p { color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>

<!-- ── TOPBAR UNIFIÉE ── -->
<div class="topbar">
  <div class="topbar-nav">
    <div class="nav-brand">
      <div class="dot"></div>
      Pruebas Funcionales
    </div>
    <button class="nav-tab active" id="tab-flash" onclick="switchPage('flash')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Flashcards
    </button>
    <button class="nav-tab" id="tab-quiz" onclick="switchPage('quiz')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
      Quiz MCQ
    </button>
  </div>
  <div class="topbar-controls" id="flash-controls">
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-label" id="progress-label">0 / 0</span>
    </div>
    <div class="sep"></div>
    <label>Región:</label>
    <select id="filter-region"><option value="all">Todas las regiones</option></select>
    <label>Categoría:</label>
    <select id="filter-cat"><option value="all">Todas las categorías</option></select>
    <div class="topbar-controls-right">
      <button id="btn-shuffle">🔀 Mezclar</button>
      <button id="btn-reset">↺ Reiniciar</button>
      <button class="primary" id="btn-review-hard">🔴 Solo difíciles</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════
     PAGE: FLASHCARDS
══════════════════════════════ -->
<div class="page active" id="page-flash">

  <main>
    <div class="card-counter" id="card-counter"></div>

    <div class="card-scene" id="card-scene">
      <div class="card" id="card" tabindex="0" role="button" aria-label="Voltear tarjeta">
        <div class="card-face card-front" id="card-front">
          <div class="card-region-badge" id="front-region"></div>
          <div class="card-num" id="front-num"></div>
          <div class="card-name" id="front-name"></div>
          <div class="card-category" id="front-category"></div>
          <div class="flip-hint">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
            Clic para ver el reverso
          </div>
        </div>
        <div class="card-face card-back" id="card-back">
          <div class="back-header">
            <div>
              <div class="back-title" id="back-name"></div>
              <div class="back-meta" id="back-meta"></div>
            </div>
          </div>
          <div class="sections">
            <div class="section">
              <div class="section-label"><span class="dot"></span>Posición del paciente</div>
              <div class="section-content" id="back-pos-patient"></div>
            </div>
            <div class="section">
              <div class="section-label"><span class="dot"></span>Posición del terapeuta</div>
              <div class="section-content" id="back-pos-therapist"></div>
            </div>
            <div class="section full">
              <div class="section-label"><span class="dot"></span>Ejecución del test</div>
              <div class="section-content" id="back-execution"></div>
            </div>
            <div class="section interpretation full">
              <div class="section-label"><span class="dot"></span>Interpretación</div>
              <div class="section-content" id="back-interpretation"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="nav-row">
      <button class="nav-btn" id="btn-prev" title="Anterior (←)">←</button>
      <div class="rating" id="rating" style="display:none">
        <button class="rating-btn easy"   id="btn-easy">✅ Fácil</button>
        <button class="rating-btn medium" id="btn-medium">⚠️ Regular</button>
        <button class="rating-btn hard"   id="btn-hard">❌ Difícil</button>
      </div>
      <button class="nav-btn" id="btn-next" title="Siguiente (→)">→</button>
    </div>

    <div id="done-screen">
      <div style="font-size:2.5rem">🎉</div>
      <h2>¡Sesión completada!</h2>
      <p>Has revisado todas las tarjetas de esta sesión.</p>
      <div class="stats">
        <div class="stat"><div class="stat-n easy" id="done-easy">0</div><div class="stat-l">Fácil</div></div>
        <div class="stat"><div class="stat-n medium" id="done-medium">0</div><div class="stat-l">Regular</div></div>
        <div class="stat"><div class="stat-n hard" id="done-hard">0</div><div class="stat-l">Difícil</div></div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
        <button class="primary" id="btn-restart-done">↺ Repetir sesión</button>
        <button id="btn-hard-done">🔴 Repasar difíciles</button>
      </div>
    </div>
  </main>
</div>

<!-- ══════════════════════════════
     PAGE: QUIZ MCQ
══════════════════════════════ -->
<div class="page" id="page-quiz">
  <div class="quiz-wrap">

    <!-- Setup panel -->
    <div class="quiz-setup" id="quiz-setup">
      <h2>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
        Configurar Quiz
      </h2>

      <div class="quiz-setup-grid">
        <div class="quiz-setup-group">
          <label>Región</label>
          <select id="quiz-filter-region"><option value="all">Todas las regiones</option></select>
        </div>
        <div class="quiz-setup-group">
          <label>N.º de preguntas</label>
          <select id="quiz-count">
            <option value="5">5 preguntas</option>
            <option value="10" selected>10 preguntas</option>
            <option value="20">20 preguntas</option>
            <option value="all">Todas</option>
          </select>
        </div>
      </div>

      <div class="quiz-setup-group" style="margin-bottom:14px">
        <label style="margin-bottom:6px;display:block">¿Qué se pregunta? (selecciona uno o varios)</label>
        <div class="quiz-param-list" id="quiz-param-list">
          <button class="quiz-param-chip selected" data-param="name">
            <span class="chip-dot"></span> Nombre del test
          </button>
          <button class="quiz-param-chip selected" data-param="posPatient">
            <span class="chip-dot"></span> Posición paciente
          </button>
          <button class="quiz-param-chip selected" data-param="posTherapist">
            <span class="chip-dot"></span> Posición terapeuta
          </button>
          <button class="quiz-param-chip selected" data-param="execution">
            <span class="chip-dot"></span> Ejecución
          </button>
          <button class="quiz-param-chip selected" data-param="interpretation">
            <span class="chip-dot"></span> Cuando es positivo
          </button>
        </div>
      </div>

      <div class="quiz-start-row">
        <button class="primary" id="btn-start-quiz">▶ Empezar Quiz</button>
        <span class="q-count" id="quiz-available-count"></span>
      </div>
    </div>

    <!-- Question card -->
    <div class="quiz-card" id="quiz-card">
      <div class="quiz-progress-row">
        <div class="quiz-prog-bar"><div class="quiz-prog-fill" id="quiz-prog-fill" style="width:0%"></div></div>
        <span class="quiz-prog-label" id="quiz-prog-label">0 / 0</span>
        <button style="margin-left:8px" onclick="endQuiz()">✕ Salir</button>
      </div>

      <div class="quiz-question-box">
        <div class="quiz-question-tag" id="quiz-q-tag"></div>
        <div class="quiz-question-text" id="quiz-q-text"></div>
        <div class="quiz-question-hint" id="quiz-q-hint"></div>
      </div>

      <div class="quiz-choices" id="quiz-choices"></div>

      <div class="quiz-actions">
        <div class="quiz-feedback" id="quiz-feedback"></div>
        <button class="primary" id="btn-quiz-validate" style="margin-left:auto">Validar</button>
        <button id="btn-quiz-next" style="display:none">Siguiente →</button>
      </div>
    </div>

    <!-- Quiz done -->
    <div class="quiz-done" id="quiz-done">
      <div style="font-size:2.5rem">🏆</div>
      <h2>Quiz completado</h2>
      <div class="quiz-score" id="quiz-score-display">0 <span>/ 0</span></div>
      <p id="quiz-score-msg"></p>
      <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px">
        <button class="primary" id="btn-quiz-restart">↺ Repetir</button>
        <button onclick="backToSetup()">⚙ Nueva config.</button>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script src="cards-data.js"></script>
<script>
// ══════════════════════════════
// PAGE SWITCHING
// ══════════════════════════════
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  // Affiche la barre de controls seulement sur Flashcards
  document.getElementById('flash-controls').style.display = name === 'flash' ? '' : 'none';
}

// ══════════════════════════════
// FLASHCARD STATE
// ══════════════════════════════
let deck = [];
let currentIndex = 0;
let isFlipped = false;
const ratings = {};
let mode = 'all';

const cardEl        = document.getElementById('card');
const frontRegion   = document.getElementById('front-region');
const frontNum      = document.getElementById('front-num');
const frontName     = document.getElementById('front-name');
const frontCat      = document.getElementById('front-category');
const backName      = document.getElementById('back-name');
const backMeta      = document.getElementById('back-meta');
const backPosPat    = document.getElementById('back-pos-patient');
const backPosTher   = document.getElementById('back-pos-therapist');
const backExec      = document.getElementById('back-execution');
const backInterp    = document.getElementById('back-interpretation');
const ratingDiv     = document.getElementById('rating');
const progressFill  = document.getElementById('progress-fill');
const progressLabel = document.getElementById('progress-label');
const cardCounter   = document.getElementById('card-counter');
const doneScreen    = document.getElementById('done-screen');
const cardScene     = document.getElementById('card-scene');
const filterRegion  = document.getElementById('filter-region');
const filterCat     = document.getElementById('filter-cat');

function populateFilters() {
  const regions = [...new Set(CARDS.map(c => c.region))];
  regions.forEach(r => {
    const o = document.createElement('option');
    o.value = r; o.textContent = r;
    filterRegion.appendChild(o);
    // also quiz filter
    const o2 = document.createElement('option');
    o2.value = r; o2.textContent = r;
    document.getElementById('quiz-filter-region').appendChild(o2);
  });
  const cats = [...new Set(CARDS.map(c => c.category))].sort();
  cats.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c;
    filterCat.appendChild(o);
  });
  updateQuizCount();
}

function buildDeck() {
  const regionVal = filterRegion.value;
  const catVal    = filterCat.value;
  let filtered = CARDS.filter(c =>
    (regionVal === 'all' || c.region === regionVal) &&
    (catVal    === 'all' || c.category === catVal)
  );
  if (mode === 'hard') filtered = filtered.filter(c => ratings[c.id] === 'hard');
  deck = filtered;
  currentIndex = 0;
  showCard();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showCard() {
  unflip(false);
  doneScreen.style.display = 'none';
  cardScene.style.display  = '';
  ratingDiv.style.display  = 'none';

  if (deck.length === 0) {
    cardCounter.textContent = 'No hay tarjetas con estos filtros.';
    cardScene.style.display = 'none';
    updateProgress();
    return;
  }
  if (currentIndex >= deck.length) { showDone(); return; }

  const c = deck[currentIndex];
  frontRegion.textContent = c.region;
  frontNum.textContent    = `Test nº ${c.num}`;
  frontName.textContent   = c.name;
  frontCat.textContent    = c.category;
  backName.textContent    = c.name;
  backMeta.textContent    = `${c.region}  ·  ${c.category}`;
  backPosPat.textContent  = c.posPatient;
  backPosTher.textContent = c.posTherapist;
  backExec.textContent    = c.execution;
  backInterp.textContent  = c.interpretation;

  cardCounter.textContent = `Tarjeta ${currentIndex + 1} de ${deck.length}`;
  updateProgress();
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = false;
}

function updateProgress() {
  const rated = deck.filter(c => ratings[c.id]).length;
  const pct   = deck.length ? (rated / deck.length) * 100 : 0;
  progressFill.style.width  = pct + '%';
  progressLabel.textContent = `${rated} / ${deck.length}`;
}

function flip() {
  isFlipped = !isFlipped;
  cardEl.classList.toggle('flipped', isFlipped);
  ratingDiv.style.display = isFlipped ? 'flex' : 'none';
  adjustCardHeight();
}

function adjustCardHeight() {
  if (isFlipped) {
    const backH = document.getElementById('card-back').scrollHeight;
    cardEl.style.height = backH + 'px';
  } else {
    cardEl.style.height = '';
  }
}

function unflip(animate = true) {
  if (!animate) cardEl.style.transition = 'none';
  isFlipped = false;
  cardEl.classList.remove('flipped');
  ratingDiv.style.display = 'none';
  cardEl.style.height = '';
  if (!animate) requestAnimationFrame(() => { cardEl.style.transition = ''; });
}

function rate(level) {
  const c = deck[currentIndex];
  if (c) ratings[c.id] = level;
  currentIndex++;
  showCard();
}

function showDone() {
  cardScene.style.display = 'none';
  doneScreen.style.display = 'flex';
  cardCounter.textContent = '';
  const counts = { easy: 0, medium: 0, hard: 0 };
  deck.forEach(c => { if (ratings[c.id]) counts[ratings[c.id]]++; });
  document.getElementById('done-easy').textContent   = counts.easy;
  document.getElementById('done-medium').textContent = counts.medium;
  document.getElementById('done-hard').textContent   = counts.hard;
  const hardCount = deck.filter(c => ratings[c.id] === 'hard').length;
  document.getElementById('btn-hard-done').style.display = hardCount ? '' : 'none';
  progressFill.style.width  = '100%';
  progressLabel.textContent = `${deck.length} / ${deck.length}`;
}

function goNext() {
  if (currentIndex < deck.length - 1 && !isFlipped) { currentIndex++; showCard(); }
}
function goPrev() {
  if (currentIndex > 0) { currentIndex--; showCard(); }
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// Events – flashcard
cardEl.addEventListener('click', flip);
cardEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); }});
document.getElementById('btn-prev').addEventListener('click', goPrev);
document.getElementById('btn-next').addEventListener('click', () => { if (isFlipped) rate('medium'); else goNext(); });
document.getElementById('btn-easy').addEventListener('click', () => rate('easy'));
document.getElementById('btn-medium').addEventListener('click', () => rate('medium'));
document.getElementById('btn-hard').addEventListener('click', () => rate('hard'));
document.getElementById('btn-shuffle').addEventListener('click', () => { shuffle(deck); currentIndex = 0; showCard(); toast('🔀 Mazo mezclado'); });
document.getElementById('btn-reset').addEventListener('click', () => { Object.keys(ratings).forEach(k => delete ratings[k]); mode = 'all'; buildDeck(); toast('↺ Sesión reiniciada'); });
document.getElementById('btn-review-hard').addEventListener('click', () => {
  const hardCount = CARDS.filter(c => ratings[c.id] === 'hard').length;
  if (hardCount === 0) { toast('No hay tarjetas marcadas como difíciles aún.'); return; }
  mode = 'hard'; buildDeck(); toast(`🔴 ${hardCount} tarjetas difíciles`);
});
document.getElementById('btn-restart-done').addEventListener('click', () => { mode = 'all'; buildDeck(); });
document.getElementById('btn-hard-done').addEventListener('click', () => { mode = 'hard'; buildDeck(); });
filterRegion.addEventListener('change', buildDeck);
filterCat.addEventListener('change', buildDeck);
document.addEventListener('keydown', e => {
  if (document.getElementById('page-flash').classList.contains('active')) {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (isFlipped) rate('medium'); else goNext(); }
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPrev();
    else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
    else if (e.key === '1' && isFlipped) rate('easy');
    else if (e.key === '2' && isFlipped) rate('medium');
    else if (e.key === '3' && isFlipped) rate('hard');
  }
});

// ══════════════════════════════
// QUIZ MCQ
// ══════════════════════════════
const PARAM_LABELS = {
  name:           'Nombre del test',
  posPatient:     'Posición del paciente',
  posTherapist:   'Posición del terapeuta',
  execution:      'Ejecución del test',
  interpretation: 'Cuando es positivo'
};

// Param chip toggle
document.querySelectorAll('.quiz-param-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    chip.classList.toggle('selected');
    updateQuizCount();
  });
});

document.getElementById('quiz-filter-region').addEventListener('change', updateQuizCount);

function getSelectedParams() {
  return [...document.querySelectorAll('.quiz-param-chip.selected')].map(c => c.dataset.param);
}

function getQuizPool() {
  const region = document.getElementById('quiz-filter-region').value;
  return CARDS.filter(c => region === 'all' || c.region === region);
}

function updateQuizCount() {
  const pool = getQuizPool();
  const params = getSelectedParams();
  const countEl = document.getElementById('quiz-available-count');
  if (params.length === 0) {
    countEl.textContent = '⚠ Selecciona al menos un parámetro';
    return;
  }
  countEl.textContent = `${pool.length} tarjetas disponibles`;
}

// Quiz state
let quizQuestions = [];
let quizIndex = 0;
let quizScore = 0;
let quizSelectedChoices = new Set();
let quizAnswered = false;

document.getElementById('btn-start-quiz').addEventListener('click', startQuiz);
document.getElementById('btn-quiz-validate').addEventListener('click', validateQuiz);
document.getElementById('btn-quiz-next').addEventListener('click', nextQuizQ);
document.getElementById('btn-quiz-restart').addEventListener('click', startQuiz);

function startQuiz() {
  const params = getSelectedParams();
  if (params.length === 0) { toast('⚠ Selecciona al menos un parámetro'); return; }

  const pool = getQuizPool();
  if (pool.length < 4) { toast('Necesitas al menos 4 tarjetas'); return; }

  // Build questions
  const countSel = document.getElementById('quiz-count').value;
  const maxQ = countSel === 'all' ? Infinity : parseInt(countSel);

  // Generate one question per (card × param) then shuffle & slice
  let qList = [];
  for (const card of pool) {
    for (const param of params) {
      if (card[param] && card[param].trim()) {
        qList.push({ card, param });
      }
    }
  }
  shuffle(qList);
  qList = qList.slice(0, maxQ);

  quizQuestions = qList;
  quizIndex = 0;
  quizScore = 0;

  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-done').classList.remove('visible');
  document.getElementById('quiz-card').classList.add('visible');

  showQuizQuestion();
}

function showQuizQuestion() {
  if (quizIndex >= quizQuestions.length) { showQuizDone(); return; }

  quizAnswered = false;
  quizSelectedChoices = new Set();

  const { card, param } = quizQuestions[quizIndex];
  const total = quizQuestions.length;

  // Progress
  document.getElementById('quiz-prog-fill').style.width = (quizIndex / total * 100) + '%';
  document.getElementById('quiz-prog-label').textContent = `${quizIndex + 1} / ${total}`;

  // Question
  const tag = document.getElementById('quiz-q-tag');
  const qText = document.getElementById('quiz-q-text');
  const hint = document.getElementById('quiz-q-hint');

  tag.textContent = PARAM_LABELS[param];

  if (param === 'name') {
    qText.textContent = `¿Cuál es el nombre del test con la siguiente descripción?\n\n"${card.interpretation}"`;
    hint.textContent = `Región: ${card.region}  ·  Categoría: ${card.category}`;
  } else if (param === 'interpretation') {
    qText.textContent = `Test: "${card.name}"\n\n¿Cuándo es positivo / qué indica?`;
    hint.textContent = `Región: ${card.region}`;
  } else if (param === 'posPatient') {
    qText.textContent = `Test: "${card.name}"\n\n¿Cuál es la posición del PACIENTE?`;
    hint.textContent = `Región: ${card.region}`;
  } else if (param === 'posTherapist') {
    qText.textContent = `Test: "${card.name}"\n\n¿Cuál es la posición del TERAPEUTA?`;
    hint.textContent = `Región: ${card.region}`;
  } else if (param === 'execution') {
    qText.textContent = `Test: "${card.name}"\n\n¿Cómo se ejecuta el test?`;
    hint.textContent = `Región: ${card.region}`;
  }

  // Build 4 choices: 1 correct + 3 distractors from same param
  const correctAnswer = card[param];
  const pool = getQuizPool().filter(c => c.id !== card.id && c[param] && c[param].trim());
  shuffle(pool);
  const distractors = pool.slice(0, 3).map(c => c[param]);

  const choices = [correctAnswer, ...distractors];
  shuffle(choices);

  const correctIndices = new Set(
    choices.map((ch, i) => ch === correctAnswer ? i : -1).filter(i => i >= 0)
  );

  // Render choices
  const choicesEl = document.getElementById('quiz-choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  choices.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-choice';
    btn.dataset.index = i;
    btn.dataset.correct = correctIndices.has(i) ? '1' : '0';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${text}</span>`;
    btn.addEventListener('click', () => {
      if (quizAnswered) return;
      if (quizSelectedChoices.has(i)) {
        quizSelectedChoices.delete(i);
        btn.classList.remove('selected');
      } else {
        quizSelectedChoices.add(i);
        btn.classList.add('selected');
      }
    });
    choicesEl.appendChild(btn);
  });

  // Reset UI
  const feedback = document.getElementById('quiz-feedback');
  feedback.className = 'quiz-feedback';
  feedback.textContent = '';
  document.getElementById('btn-quiz-validate').style.display = '';
  document.getElementById('btn-quiz-next').style.display = 'none';
}

function validateQuiz() {
  if (quizAnswered) return;
  if (quizSelectedChoices.size === 0) { toast('Selecciona una respuesta'); return; }

  quizAnswered = true;
  const choices = document.querySelectorAll('.quiz-choice');

  let allCorrect = true;
  choices.forEach(btn => {
    btn.classList.add('revealed');
    const idx = parseInt(btn.dataset.index);
    const isCorrect = btn.dataset.correct === '1';
    const isSelected = quizSelectedChoices.has(idx);

    if (isCorrect) btn.classList.add('correct');
    else if (isSelected && !isCorrect) { btn.classList.add('wrong'); allCorrect = false; }
    if (isCorrect && !isSelected) allCorrect = false;
  });

  const feedback = document.getElementById('quiz-feedback');
  if (allCorrect) {
    quizScore++;
    feedback.textContent = '✅ ¡Correcto!';
    feedback.className = 'quiz-feedback show ok';
  } else {
    feedback.textContent = '❌ Respuesta incorrecta.';
    feedback.className = 'quiz-feedback show bad';
  }

  document.getElementById('btn-quiz-validate').style.display = 'none';
  document.getElementById('btn-quiz-next').style.display = '';
}

function nextQuizQ() {
  quizIndex++;
  showQuizQuestion();
}

function showQuizDone() {
  document.getElementById('quiz-card').classList.remove('visible');
  const done = document.getElementById('quiz-done');
  done.classList.add('visible');

  const total = quizQuestions.length;
  document.getElementById('quiz-score-display').innerHTML = `${quizScore} <span>/ ${total}</span>`;

  const pct = Math.round(quizScore / total * 100);
  let msg = pct >= 80 ? '¡Excelente trabajo! 🔥' : pct >= 60 ? 'Buen intento, sigue practicando.' : 'Repasa las tarjetas y vuelve a intentarlo.';
  document.getElementById('quiz-score-msg').textContent = `${pct}% de aciertos. ${msg}`;

  document.getElementById('quiz-prog-fill').style.width = '100%';
  document.getElementById('quiz-prog-label').textContent = `${total} / ${total}`;
}

function endQuiz() {
  document.getElementById('quiz-card').classList.remove('visible');
  document.getElementById('quiz-done').classList.remove('visible');
  document.getElementById('quiz-setup').style.display = '';
}

function backToSetup() {
  document.getElementById('quiz-done').classList.remove('visible');
  document.getElementById('quiz-setup').style.display = '';
}

// ── INIT ──
populateFilters();
buildDeck();
</script>
