<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pruebas Funcionales – Fisioterapia</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #121008;
      --surface:    #1c1912;
      --surface2:   #26221a;
      --surface3:   #302b20;
      --border:     #3c3526;
      --border2:    #4a4130;
      --accent:     #d97b3a;
      --accent2:    #e8a96a;
      --accent-dim: rgba(217,123,58,0.13);
      --green:      #5cb87a;
      --amber:      #e8a96a;
      --red:        #e06060;
      --text:       #ede8e0;
      --muted:      #8a7d6a;
      --muted2:     #6a5f50;
      --radius:     12px;
    }

    html, body { height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ════════════════════════════
       TOPBAR — deux niveaux
    ════════════════════════════ */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 60;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .topbar-brand-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 48px;
      border-bottom: 1px solid var(--border);
    }
    .brand-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      letter-spacing: -0.01em;
      color: var(--text);
      white-space: nowrap;
    }
    .brand-pip {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(217,123,58,0.6);
      flex-shrink: 0;
    }
    .brand-sub {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 400;
      margin-left: 2px;
    }
    .topbar-progress {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      max-width: 260px;
      margin-left: auto;
    }

    /* ── LANG PICKER ── */
    .lang-wrap {
      position: relative;
      margin-left: 12px;
      flex-shrink: 0;
    }
    .lang-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 7px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s;
      white-space: nowrap;
    }
    .lang-btn:hover { border-color: var(--accent); }
    .lang-btn .lang-flag { font-size: 0.9rem; }
    .lang-btn svg { opacity: 0.6; flex-shrink: 0; }
    .lang-btn.translating { color: var(--accent2); border-color: var(--accent); }
    .lang-btn.translating svg { animation: spin 1s linear infinite; opacity: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .lang-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 9px;
      overflow: hidden;
      min-width: 140px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .lang-dropdown.open { display: block; }
    .lang-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
      border: none;
      background: none;
      width: 100%;
      font-family: inherit;
      text-align: left;
    }
    .lang-option:hover { background: var(--surface2); color: var(--text); }
    .lang-option.active { color: var(--accent2); background: var(--accent-dim); }
    .lang-option .flag { font-size: 1rem; }
    .prog-bar { flex: 1; height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .prog-label { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }

    .topbar-tabs {
      display: flex;
      align-items: stretch;
      padding: 0 20px;
      height: 38px;
      gap: 2px;
    }
    .tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 14px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab-btn svg { opacity: 0.6; transition: opacity 0.15s; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn:hover svg { opacity: 0.9; }
    .tab-btn.active { color: var(--accent2); border-bottom-color: var(--accent); }
    .tab-btn.active svg { opacity: 1; }

    /* ════════════════════════════
       PAGES
    ════════════════════════════ */
    .page { display: none; flex: 1; flex-direction: column; }
    .page.active { display: flex; }

    /* ════════════════════════════
       FLASHCARD PAGE
    ════════════════════════════ */
    .fc-controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .fc-controls label { font-size: 0.72rem; color: var(--muted); }
    .fc-controls select,
    .fc-btn {
      font-family: inherit;
      font-size: 0.78rem;
      border-radius: 7px;
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--text);
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .fc-controls select:hover, .fc-btn:hover { border-color: var(--accent); }
    .fc-btn-primary {
      background: var(--accent) !important;
      border-color: var(--accent) !important;
      color: #fff !important;
      font-weight: 600;
    }
    .fc-btn-primary:hover { background: var(--accent2) !important; border-color: var(--accent2) !important; color: #1c1912 !important; }
    .controls-right { margin-left: auto; display: flex; gap: 6px; }

    .fc-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 48px;
      gap: 20px;
    }
    .card-counter { font-size: 0.72rem; color: var(--muted); font-family: 'DM Mono', monospace; }

    .card-scene { width: 100%; max-width: 680px; perspective: 1200px; }
    .card-3d {
      position: relative;
      width: 100%;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .card-3d.flipped { transform: rotateY(180deg); }
    .card-face {
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      overflow: hidden;
    }
    .card-front {
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 52px 40px;
      min-height: 300px;
      position: relative;
    }
    .card-front::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(217,123,58,0.07) 0%, transparent 100%);
      pointer-events: none;
    }
    .card-back {
      position: absolute;
      top: 0; left: 0; right: 0;
      min-height: 100%;
      background: var(--surface);
      transform: rotateY(180deg);
      padding: 22px 26px;
    }
    .card-region-badge {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); background: var(--surface2); border: 1px solid var(--border2);
      padding: 3px 10px; border-radius: 99px; margin-bottom: 16px;
    }
    .card-num { font-size: 0.65rem; color: var(--muted2); margin-bottom: 6px; font-family: 'DM Mono', monospace; }
    .card-name { font-size: 1.45rem; font-weight: 700; line-height: 1.25; margin-bottom: 10px; }
    .card-category { font-size: 0.75rem; color: var(--accent2); font-weight: 500; }
    .flip-hint { margin-top: 22px; font-size: 0.65rem; color: var(--muted2); display: flex; align-items: center; gap: 5px; }

    .back-header { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .back-title { font-size: 1rem; font-weight: 700; line-height: 1.3; }
    .back-meta  { font-size: 0.68rem; color: var(--accent2); margin-top: 3px; }

    .sections { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    @media (max-width: 540px) { .sections { grid-template-columns: 1fr; } }
    .section { background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; padding: 11px 13px; }
    .section.full { grid-column: 1 / -1; }
    .section-label {
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); font-weight: 600; margin-bottom: 6px;
      display: flex; align-items: center; gap: 5px;
    }
    .sdot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .section.interp .sdot { background: var(--green); }
    /* ── CARD IMAGE ── */
    .card-img-wrap {
      grid-column: 1 / -1;
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface3);
      display: flex;
      align-items: center;
      justify-content: center;
      max-height: 240px;
    }
    .card-img-wrap img {
      width: 100%;
      height: 100%;
      max-height: 240px;
      object-fit: contain;
      display: block;
    }
    .card-img-wrap.hidden { display: none; }

    .section-content { font-size: 0.8rem; line-height: 1.55; white-space: pre-line; }

    .card-nav-row { display: flex; align-items: center; gap: 12px; }
    .cnav-btn {
      width: 38px; height: 38px; border-radius: 50%;
      border: 1px solid var(--border2); background: var(--surface);
      color: var(--text); font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-family: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .cnav-btn:hover { background: var(--surface2); border-color: var(--accent); }
    .cnav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    .rating-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .rating-btn {
      padding: 6px 16px; border-radius: 99px; font-size: 0.76rem; font-weight: 600;
      border: 1.5px solid; cursor: pointer; font-family: inherit; background: transparent;
      transition: all 0.15s;
    }
    .rating-btn.easy   { border-color: var(--green); color: var(--green); }
    .rating-btn.medium { border-color: var(--amber); color: var(--amber); }
    .rating-btn.hard   { border-color: var(--red);   color: var(--red); }
    .rating-btn.easy:hover   { background: var(--green); color: #0d1f14; }
    .rating-btn.medium:hover { background: var(--amber); color: #1d160a; }
    .rating-btn.hard:hover   { background: var(--red);   color: #fff; }

    #done-screen {
      display: none; flex-direction: column; align-items: center;
      gap: 14px; padding: 40px 24px; text-align: center; max-width: 420px; width: 100%;
    }
    #done-screen h2 { font-size: 1.6rem; }
    #done-screen p  { color: var(--muted); font-size: 0.85rem; line-height: 1.6; }
    .stats { display: flex; gap: 24px; }
    .stat { text-align: center; }
    .stat-n { font-size: 1.9rem; font-weight: 700; font-family: 'DM Mono', monospace; }
    .stat-n.easy { color: var(--green); } .stat-n.medium { color: var(--amber); } .stat-n.hard { color: var(--red); }
    .stat-l { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .done-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    #toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border2);
      padding: 8px 16px; border-radius: 99px; font-size: 0.76rem; color: var(--text);
      opacity: 0; pointer-events: none; transition: opacity 0.25s; z-index: 200;
    }
    #toast.show { opacity: 1; }

    /* ════════════════════════════
       QUIZ
    ════════════════════════════ */
    .quiz-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 28px 16px 48px; gap: 20px;
    }
    .quiz-setup {
      width: 100%; max-width: 660px;
      background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 22px 24px;
    }
    .quiz-setup-title {
      font-size: 0.85rem; font-weight: 700; color: var(--accent2);
      margin-bottom: 18px; display: flex; align-items: center; gap: 8px;
    }
    .quiz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 18px; }
    @media (max-width: 500px) { .quiz-grid { grid-template-columns: 1fr; } }
    .quiz-field { display: flex; flex-direction: column; gap: 5px; }
    .quiz-field label {
      font-size: 0.65rem; text-transform: uppercase;
      letter-spacing: 0.09em; color: var(--muted); font-weight: 600;
    }
    .quiz-field select {
      font-family: inherit; font-size: 0.78rem; border-radius: 7px;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--text); padding: 6px 10px; cursor: pointer; width: 100%;
      transition: border-color 0.15s;
    }
    .quiz-field select:hover { border-color: var(--accent); }

    .qparams-label {
      font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.09em;
      color: var(--muted); font-weight: 600; margin-bottom: 8px;
    }
    .quiz-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 99px; border: 1.5px solid var(--border2);
      background: var(--surface2); font-size: 0.76rem; color: var(--muted);
      cursor: pointer; font-family: inherit; transition: all 0.15s; user-select: none;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }
    .chip.on { border-color: var(--accent); color: var(--accent2); background: var(--accent-dim); }
    .chip-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    .quiz-launch-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .quiz-avail { font-size: 0.75rem; color: var(--muted); }

    .gbtn {
      font-family: inherit; font-size: 0.78rem; border-radius: 7px;
      border: 1px solid var(--border2); background: var(--surface2);
      color: var(--text); padding: 6px 14px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .gbtn:hover { border-color: var(--accent); }
    .gbtn.primary {
      background: var(--accent); border-color: var(--accent);
      color: #fff; font-weight: 600;
    }
    .gbtn.primary:hover { background: var(--accent2); border-color: var(--accent2); color: #1c1912; }

    .quiz-qcard { width: 100%; max-width: 660px; display: none; flex-direction: column; gap: 14px; }
    .quiz-qcard.visible { display: flex; }

    .qprog-row { display: flex; align-items: center; gap: 10px; }
    .qprog-bar { flex: 1; height: 3px; background: var(--border2); border-radius: 99px; overflow: hidden; }
    .qprog-fill {
      height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px; transition: width 0.35s ease;
    }
    .qprog-label { font-size: 0.7rem; color: var(--muted); font-family: 'DM Mono', monospace; white-space: nowrap; }

    .qbox { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); padding: 18px 20px; }
    .q-tag { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); font-weight: 600; margin-bottom: 7px; }
    .q-text { font-size: 0.88rem; line-height: 1.55; font-weight: 500; white-space: pre-line; }
    .q-hint { font-size: 0.68rem; color: var(--muted); margin-top: 9px; }

    .q-choices { display: flex; flex-direction: column; gap: 7px; }
    .q-choice {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 11px 14px; border-radius: 9px; border: 1.5px solid var(--border2);
      background: var(--surface); cursor: pointer; font-family: inherit;
      font-size: 0.8rem; line-height: 1.45; color: var(--text); text-align: left;
      transition: border-color 0.12s, background 0.12s;
    }
    .q-choice:hover { border-color: var(--accent); background: var(--surface2); }
    .q-choice.sel  { border-color: var(--accent);  background: var(--accent-dim); }
    .q-choice.ok   { border-color: var(--green) !important; background: rgba(92,184,122,0.09) !important; color: var(--green); }
    .q-choice.bad  { border-color: var(--red) !important;   background: rgba(224,96,96,0.09) !important;  color: var(--red); opacity: 0.8; }
    .q-choice.done { cursor: default; }
    .choice-letter {
      width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2);
      background: var(--surface2); font-size: 0.63rem; font-weight: 700;
      font-family: 'DM Mono', monospace;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: all 0.12s;
    }
    .q-choice.sel .choice-letter { border-color: var(--accent); background: var(--accent); color: #fff; }
    .q-choice.ok  .choice-letter { border-color: var(--green);  background: var(--green);  color: #0d1f14; }
    .q-choice.bad .choice-letter { border-color: var(--red);    background: var(--red);    color: #fff; }

    .q-actions { display: flex; gap: 8px; align-items: center; }
    .q-feedback { flex: 1; font-size: 0.78rem; display: none; }
    .q-feedback.show { display: block; }
    .q-feedback.ok  { color: var(--green); }
    .q-feedback.bad { color: var(--red); }

    .quiz-done {
      width: 100%; max-width: 420px; background: var(--surface);
      border: 1px solid var(--border2); border-radius: var(--radius);
      padding: 32px 24px; text-align: center; align-items: center;
      gap: 14px; display: none; flex-direction: column;
    }
    .quiz-done.visible { display: flex; }
    .quiz-done h2 { font-size: 1.4rem; }
    .qscore { font-size: 2.8rem; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--accent2); }
    .qscore span { font-size: 1.1rem; color: var(--muted); font-weight: 400; }
    .quiz-done p { color: var(--muted); font-size: 0.82rem; }
  </style>
</head>
<body>

<!-- ════════════════════════════
     TOPBAR
════════════════════════════ -->
<div id="topbar">
  <div class="topbar-brand-row">
    <div class="brand-logo">
      <div class="brand-pip"></div>
      Pruebas Funcionales
      <span class="brand-sub">Fisioterapia</span>
    </div>
    <div class="topbar-progress" id="topbar-progress">
      <div class="prog-bar"><div class="prog-fill" id="progress-fill"></div></div>
      <span class="prog-label" id="progress-label">0 / 0</span>
    </div>
    <div class="lang-wrap" id="lang-wrap">
      <button class="lang-btn" id="lang-btn" onclick="toggleLangMenu()">
        <span class="lang-flag" id="lang-flag">🇪🇸</span>
        <span id="lang-label">ES</span>
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      <div class="lang-dropdown" id="lang-dropdown">
        <button class="lang-option active" data-lang="es" onclick="setLang('es')"><span class="flag">🇪🇸</span> Español</button>
        <button class="lang-option" data-lang="fr" onclick="setLang('fr')"><span class="flag">🇫🇷</span> Français</button>
        <button class="lang-option" data-lang="en" onclick="setLang('en')"><span class="flag">🇬🇧</span> English</button>
      </div>
    </div>
  </div>
  <div class="topbar-tabs">
    <button class="tab-btn active" id="tab-flash" onclick="switchPage('flash')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Flashcards
    </button>
    <button class="tab-btn" id="tab-quiz" onclick="switchPage('quiz')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3M12 17h.01"/></svg>
      Quiz MCQ
    </button>
  </div>
</div>

<!-- ════════════════════════════
     PAGE: FLASHCARDS
════════════════════════════ -->
<div class="page active" id="page-flash">
  <div class="fc-controls">
    <label>Región:</label>
    <select id="filter-region"><option value="all">Todas</option></select>
    <label>Categoría:</label>

<script>
// ═══════════════════════════════
// PAGE SWITCH
// ═══════════════════════════════
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('topbar-progress').style.display = name === 'flash' ? '' : 'none';
}

// ═══════════════════════════════
// FLASHCARDS
// ═══════════════════════════════
let deck = [], currentIndex = 0, isFlipped = false;
const ratings = {};
let mode = 'all';
let currentLang = 'es';

const cardEl       = document.getElementById('card');
const ratingDiv    = document.getElementById('rating');
const progressFill = document.getElementById('progress-fill');
const progressLbl  = document.getElementById('progress-label');
const cardCounter  = document.getElementById('card-counter');
const doneScreen   = document.getElementById('done-screen');
const cardScene    = document.getElementById('card-scene');
const filterRegion = document.getElementById('filter-region');
const filterCat    = document.getElementById('filter-cat');

function populateFilters() {
  const regions = [...new Set(CARDS.map(c => c.es.region))];
  regions.forEach(r => {
    const card = CARDS.find(c => c.es.region === r);
    const label = card ? getCardData(card).region : r;
    [filterRegion, document.getElementById('quiz-filter-region')].forEach(sel => {
      const o = document.createElement('option');
      o.value = r; o.textContent = label;
      sel.appendChild(o);
    });
  });
  const cats = [...new Set(CARDS.map(c => c.es.category))].sort();
  cats.forEach(cat => {
    const o = document.createElement('option');
    o.value = cat; o.textContent = cat;
    filterCat.appendChild(o);
  });
  updateQuizAvail();
}

function buildDeck() {
  const rv = filterRegion.value, cv = filterCat.value;
  let f = CARDS.filter(c =>
    (rv === 'all' || c.es.region === rv) &&
    (cv === 'all' || c.es.category === cv)
  );
  if (mode === 'hard') f = f.filter(c => ratings[c.id] === 'hard');
  deck = f; currentIndex = 0; showCard();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function showCard() {
  unflip(false);
  doneScreen.style.display = 'none';
  cardScene.style.display  = '';
  ratingDiv.style.display  = 'none';

  if (deck.length === 0) {
    cardCounter.textContent = t('no_cards');
    cardScene.style.display = 'none';
    updateProgress(); return;
  }
  if (currentIndex >= deck.length) { showDone(); return; }

  const raw = deck[currentIndex];
  const c = getCardData(raw);
  document.getElementById('front-region').textContent       = c.region;
  document.getElementById('front-num').textContent          = t('test_no', raw.num);
  document.getElementById('front-name').textContent         = c.name;
  document.getElementById('front-category').textContent     = c.category;
  document.getElementById('back-name').textContent          = c.name;
  document.getElementById('back-meta').textContent          = `${c.region}  ·  ${c.category}`;
  document.getElementById('back-pos-patient').textContent   = c.posPatient;
  document.getElementById('back-pos-therapist').textContent = c.posTherapist;
  document.getElementById('back-execution').textContent     = c.execution;
  document.getElementById('back-interpretation').textContent = c.interpretation;

  cardCounter.textContent = t('card_of', currentIndex + 1, deck.length);

  // Image
  const imgWrap = document.getElementById('card-img-wrap');
  const imgEl   = document.getElementById('card-img');
  if (raw.image) {
    imgEl.src = raw.image;
    imgEl.alt = raw.es.name;
    imgWrap.classList.remove('hidden');
  } else {
    imgWrap.classList.add('hidden');
    imgEl.src = '';
  }
  updateProgress();
  document.getElementById('btn-prev').disabled = currentIndex === 0;
  document.getElementById('btn-next').disabled = false;
}

function updateProgress() {
  const rated = deck.filter(c => ratings[c.id]).length;
  const pct   = deck.length ? (rated / deck.length) * 100 : 0;
  progressFill.style.width = pct + '%';
  progressLbl.textContent  = `${rated} / ${deck.length}`;
}

function flip() {
  isFlipped = !isFlipped;
  cardEl.classList.toggle('flipped', isFlipped);
  ratingDiv.style.display = isFlipped ? 'flex' : 'none';
  if (isFlipped) {
    cardEl.style.height = document.getElementById('card-back').scrollHeight + 'px';
  } else {
    cardEl.style.height = '';
  }
}

function unflip(animate = true) {
  if (!animate) cardEl.style.transition = 'none';
  isFlipped = false;
  cardEl.classList.remove('flipped');
  ratingDiv.style.display = 'none';
  cardEl.style.height = '';
  if (!animate) requestAnimationFrame(() => { cardEl.style.transition = ''; });
}

function rate(level) {
  const c = deck[currentIndex];
  if (c) ratings[c.id] = level;
  currentIndex++; showCard();
}

function showDone() {
  cardScene.style.display  = 'none';
  doneScreen.style.display = 'flex';
  cardCounter.textContent  = '';
  const counts = { easy: 0, medium: 0, hard: 0 };
  deck.forEach(c => { if (ratings[c.id]) counts[ratings[c.id]]++; });
  document.getElementById('done-easy').textContent   = counts.easy;
  document.getElementById('done-medium').textContent = counts.medium;
  document.getElementById('done-hard').textContent   = counts.hard;
  document.getElementById('btn-hard-done').style.display =
    deck.filter(c => ratings[c.id] === 'hard').length ? '' : 'none';
  progressFill.style.width = '100%';
  progressLbl.textContent  = `${deck.length} / ${deck.length}`;
}

function goNext() { if (currentIndex < deck.length - 1 && !isFlipped) { currentIndex++; showCard(); } }
function goPrev() { if (currentIndex > 0) { currentIndex--; showCard(); } }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

cardEl.addEventListener('click', flip);
cardEl.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); }});
document.getElementById('btn-prev').addEventListener('click', goPrev);
document.getElementById('btn-next').addEventListener('click', () => { if (isFlipped) rate('medium'); else goNext(); });
document.getElementById('btn-easy').addEventListener('click',   () => rate('easy'));
document.getElementById('btn-medium').addEventListener('click', () => rate('medium'));
document.getElementById('btn-hard').addEventListener('click',   () => rate('hard'));
document.getElementById('btn-shuffle').addEventListener('click', () => { shuffle(deck); currentIndex = 0; showCard(); toast(t('toast_shuffle')); });
document.getElementById('btn-reset').addEventListener('click', () => {
  Object.keys(ratings).forEach(k => delete ratings[k]);
  mode = 'all'; buildDeck(); toast(t('toast_reset'));
});
document.getElementById('btn-review-hard').addEventListener('click', () => {
  const n = CARDS.filter(c => ratings[c.id] === 'hard').length;
  if (!n) { toast(t('no_hard')); return; }
  mode = 'hard'; buildDeck(); toast(t('toast_hard', n));
});
document.getElementById('btn-restart-done').addEventListener('click', () => { mode = 'all'; buildDeck(); });
document.getElementById('btn-hard-done').addEventListener('click', () => { mode = 'hard'; buildDeck(); });
filterRegion.addEventListener('change', buildDeck);
filterCat.addEventListener('change', buildDeck);
document.addEventListener('keydown', e => {
  if (!document.getElementById('page-flash').classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (isFlipped) rate('medium'); else goNext(); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goPrev();
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flip(); }
  else if (e.key === '1' && isFlipped) rate('easy');
  else if (e.key === '2' && isFlipped) rate('medium');
  else if (e.key === '3' && isFlipped) rate('hard');
});

// ═══════════════════════════════
// QUIZ
// ═══════════════════════════════
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => { chip.classList.toggle('on'); updateQuizAvail(); });
});
document.getElementById('quiz-filter-region').addEventListener('change', updateQuizAvail);

function getSelectedParams() {
  return [...document.querySelectorAll('.chip.on')].map(c => c.dataset.param);
}
function getQuizPool() {
  const r = document.getElementById('quiz-filter-region').value;
  return CARDS.filter(c => r === 'all' || c.es.region === r);
}
function updateQuizAvail() {
  const el = document.getElementById('quiz-avail');
  const params = getSelectedParams();
  if (!params.length) { el.textContent = t('quiz_no_param'); return; }
  el.textContent = t('quiz_avail', getQuizPool().length);
}

let quizQs = [], quizIdx = 0, quizScore = 0;
let quizSel = new Set(), quizAnswered = false;

document.getElementById('btn-start-quiz').addEventListener('click',  startQuiz);
document.getElementById('btn-validate').addEventListener('click',    validateQuiz);
document.getElementById('btn-qnext').addEventListener('click',       nextQ);
document.getElementById('btn-quiz-restart').addEventListener('click', startQuiz);

function startQuiz() {
  const params = getSelectedParams();
  if (!params.length) { toast(t('quiz_no_param')); return; }
  const pool = getQuizPool();
  if (pool.length < 4) { toast(t('quiz_need_4')); return; }

  const countSel = document.getElementById('quiz-count').value;
  const maxQ = countSel === 'all' ? Infinity : parseInt(countSel);

  let qList = [];
  for (const card of pool)
    for (const param of params)
      if (getCardData(card)[param]?.trim()) qList.push({ card, param });

  shuffle(qList);
  quizQs = qList.slice(0, maxQ);
  quizIdx = 0; quizScore = 0;

  document.getElementById('quiz-setup').style.display = 'none';
  document.getElementById('quiz-done').classList.remove('visible');
  document.getElementById('quiz-qcard').classList.add('visible');
  showQ();
}

function showQ() {
  if (quizIdx >= quizQs.length) { showQuizDone(); return; }
  quizAnswered = false; quizSel = new Set();

  const { card, param } = quizQs[quizIdx];
  const total = quizQs.length;

  document.getElementById('qprog-fill').style.width  = (quizIdx / total * 100) + '%';
  document.getElementById('qprog-label').textContent = `${quizIdx + 1} / ${total}`;
  document.getElementById('q-tag').textContent = t('param_labels')[param];

  const cd = getCardData(card);
  document.getElementById('q-text').textContent = t('q_texts')[param](cd);
  document.getElementById('q-hint').textContent = t('q_hint', cd, param);

  const correct = cd[param];
  const pool = getQuizPool().filter(c => c.id !== card.id && getCardData(c)[param]?.trim());
  shuffle(pool);
  const choices = [correct, ...pool.slice(0, 3).map(c => getCardData(c)[param])];
  shuffle(choices);
  const correctSet = new Set(choices.map((ch, i) => ch === correct ? i : -1).filter(i => i >= 0));

  const choicesEl = document.getElementById('q-choices');
  choicesEl.innerHTML = '';
  ['A','B','C','D'].forEach((letter, i) => {
    if (i >= choices.length) return;
    const btn = document.createElement('button');
    btn.className = 'q-choice';
    btn.dataset.index   = i;
    btn.dataset.correct = correctSet.has(i) ? '1' : '0';
    btn.innerHTML = `<span class="choice-letter">${letter}</span><span>${choices[i]}</span>`;
    btn.addEventListener('click', () => {
      if (quizAnswered) return;
      quizSel.has(i) ? quizSel.delete(i) : quizSel.add(i);
      btn.classList.toggle('sel', quizSel.has(i));
    });
    choicesEl.appendChild(btn);
  });

  const fb = document.getElementById('q-feedback');
  fb.className = 'q-feedback'; fb.textContent = '';
  document.getElementById('btn-validate').style.display = '';
  document.getElementById('btn-qnext').style.display = 'none';
}

function validateQuiz() {
  if (quizAnswered) return;
  if (!quizSel.size) { toast(t('quiz_select_answer')); return; }
  quizAnswered = true;

  let allOk = true;
  document.querySelectorAll('.q-choice').forEach(btn => {
    btn.classList.add('done');
    const i = parseInt(btn.dataset.index);
    const isCorrect  = btn.dataset.correct === '1';
    const isSelected = quizSel.has(i);
    if (isCorrect)           btn.classList.add('ok');
    else if (isSelected)   { btn.classList.add('bad'); allOk = false; }
    if (isCorrect && !isSelected) allOk = false;
  });

  if (allOk) quizScore++;
  const fb = document.getElementById('q-feedback');
  fb.textContent = allOk ? t('quiz_correct') : t('quiz_wrong');
  fb.className = 'q-feedback show ' + (allOk ? 'ok' : 'bad');
  document.getElementById('btn-validate').style.display = 'none';
  document.getElementById('btn-qnext').style.display = '';
}

function nextQ() { quizIdx++; showQ(); }

function showQuizDone() {
  document.getElementById('quiz-qcard').classList.remove('visible');
  document.getElementById('quiz-done').classList.add('visible');
  const total = quizQs.length;
  document.getElementById('qscore').innerHTML = `${quizScore} <span>/ ${total}</span>`;
  const pct = Math.round(quizScore / total * 100);
  document.getElementById('qscore-msg').textContent = t('quiz_score_msg', pct);
  document.getElementById('qprog-fill').style.width  = '100%';
  document.getElementById('qprog-label').textContent = `${total} / ${total}`;
}

function endQuiz() {
  document.getElementById('quiz-qcard').classList.remove('visible');
  document.getElementById('quiz-done').classList.remove('visible');
  document.getElementById('quiz-setup').style.display = '';
}
function backToSetup() {
  document.getElementById('quiz-done').classList.remove('visible');
  document.getElementById('quiz-setup').style.display = '';
}

function t(key, ...args) {
  const val = UI[currentLang][key];
  return typeof val === 'function' ? val(...args) : val;
}

// Retourne les données de la carte dans la langue active (fallback ES)
function getCardData(card) {
  const lang = card[currentLang] || card['es'];
  return lang || card; // fallback total si ancienne structure
}

function toggleLangMenu() {
  document.getElementById('lang-dropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  if (!document.getElementById('lang-wrap').contains(e.target))
    document.getElementById('lang-dropdown').classList.remove('open');
});

function setLang(lang) {
  document.getElementById('lang-dropdown').classList.remove('open');
  if (lang === currentLang) return;
  currentLang = lang;

  const meta = { es:{flag:'🇪🇸',label:'ES'}, fr:{flag:'🇫🇷',label:'FR'}, en:{flag:'🇬🇧',label:'EN'} };
  document.getElementById('lang-flag').textContent  = meta[lang].flag;
  document.getElementById('lang-label').textContent = meta[lang].label;
  document.querySelectorAll('.lang-option').forEach(o =>
    o.classList.toggle('active', o.dataset.lang === lang));

  applyUIStrings();
  rebuildFilters();
  showCard();
  updateQuizAvail();
}

function applyUIStrings() {
  // Tabs
  document.getElementById('tab-flash').childNodes[1].textContent = ' ' + t('tab_flash');
  document.getElementById('tab-quiz').childNodes[1].textContent  = ' ' + t('tab_quiz');
  // Controls labels
  const labels = document.querySelectorAll('.fc-controls label');
  if (labels[0]) labels[0].textContent = t('region_label');
  if (labels[1]) labels[1].textContent = t('cat_label');
  // Buttons
  document.getElementById('btn-shuffle').textContent    = t('btn_shuffle');
  document.getElementById('btn-reset').textContent      = t('btn_reset');
  document.getElementById('btn-review-hard').textContent= t('btn_hard');
  // Flip hint
  const hint = document.querySelector('.flip-hint');
  if (hint) hint.lastChild.textContent = ' ' + t('flip_hint');
  // Section labels
  const secs = document.querySelectorAll('.section-label');
  const secKeys = ['sec_pos_patient','sec_pos_therapist','sec_execution','sec_interpretation'];
  secs.forEach((s, i) => { if (secKeys[i]) s.lastChild.textContent = t(secKeys[i]); });
  // Rating buttons
  document.getElementById('btn-easy').textContent   = t('btn_easy');
  document.getElementById('btn-medium').textContent = t('btn_medium');
  document.getElementById('btn-hard').textContent   = t('btn_hard_rate');
  // Done screen
  document.querySelector('#done-screen h2').textContent = t('done_title');
  document.querySelector('#done-screen p').textContent  = t('done_sub');
  document.querySelector('.stat-l:nth-child(1)') && (()=>{
    const ls = document.querySelectorAll('.stat-l');
    if (ls[0]) ls[0].textContent = t('done_easy');
    if (ls[1]) ls[1].textContent = t('done_medium');
    if (ls[2]) ls[2].textContent = t('done_hard');
  })();
  document.getElementById('btn-restart-done').textContent = t('btn_restart');
  document.getElementById('btn-hard-done').textContent    = t('btn_only_hard');
  // Quiz setup
  const qst = document.querySelector('.quiz-setup-title'); if(qst) qst.lastChild.textContent = ' ' + t('quiz_title');
  const qfl = document.querySelector('.quiz-field label'); if(qfl) qfl.textContent = t('quiz_region');
  const qpl = document.querySelector('.qparams-label'); if(qpl) qpl.textContent = t('quiz_what');
  document.getElementById('btn-start-quiz').textContent = t('quiz_start');
  // Chips
  const chips = document.querySelectorAll('.chip');
  const chipKeys = ['chip_name','chip_posP','chip_posT','chip_exec','chip_interp'];
  chips.forEach((c,i) => { if (chipKeys[i]) c.lastChild.textContent = t(chipKeys[i]); });
  // Quiz question buttons
  document.getElementById('btn-validate').textContent = t('quiz_validate');
  document.getElementById('btn-qnext').textContent    = t('quiz_next');
  document.getElementById('btn-quiz-restart').textContent = t('quiz_restart');
  document.querySelector('#quiz-done [onclick="backToSetup()"]').textContent = t('quiz_new_config');
}

function rebuildFilters() {
  const rv = filterRegion.value, cv = filterCat.value;
  // Option "Toutes"
  filterRegion.options[0].textContent = t('all_regions');
  filterCat.options[0].textContent    = t('all_cats');
  document.getElementById('quiz-filter-region').options[0].textContent = t('all_regions');
  // Régions — valeur stable ES, texte traduit
  for (let i = 1; i < filterRegion.options.length; i++) {
    const esVal = filterRegion.options[i].value;
    const card = CARDS.find(c => c.es.region === esVal);
    if (card) {
      const translated = getCardData(card).region;
      filterRegion.options[i].textContent = translated;
      document.getElementById('quiz-filter-region').options[i].textContent = translated;
    }
  }
  // Catégories — valeur stable ES, texte traduit
  for (let i = 1; i < filterCat.options.length; i++) {
    const esVal = filterCat.options[i].value;
    const card = CARDS.find(c => c.es.category === esVal);
    if (card) filterCat.options[i].textContent = getCardData(card).category;
  }
  filterRegion.value = rv;
  filterCat.value    = cv;
}

// ── INIT ──
populateFilters();
buildDeck();
applyUIStrings();
</script>
